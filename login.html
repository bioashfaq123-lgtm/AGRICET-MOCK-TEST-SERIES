<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Register – AGRICET Mocks</title>
  <link rel="stylesheet" href="./main.css" />
</head>
<body>
  <header class="navbar">
    <a href="./index.html" class="logo">AGRICETMocks</a>
  </header>

  <main class="container" style="max-width:720px;margin:40px auto;">
    <h1>Login / Register</h1>
    <p>GitHub Pages is a static site, so real authentication isn’t available here. You can still collect registrations using a form service (e.g., Google Forms, Formspree) or move to a backend (Firebase/Supabase/Netlify).</p>

    <section class="card" style="padding:20px;margin-top:20px;">
      <h2>Quick Register (demo)</h2>
      <form onsubmit="event.preventDefault(); alert('Thanks! This demo form does not save data on GitHub Pages.');">
        <label>Name<br><input type="text" required></label><br><br>
        <label>Email<br><input type="email" required></label><br><br>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
    </section>

    <p style="margin-top:24px;"><a href="./index.html">← Back to Home</a></p>
  </main>

  <script src="./main.js"></script>
</body>
</html>
